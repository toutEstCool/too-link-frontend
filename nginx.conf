server {
    listen 80;
    server_name localhost;

    # Логи доступа и ошибок
    access_log /var/log/nginx/billing_access.log;
    error_log /var/log/nginx/billing_error.log;

    # Раздача статических файлов фронтенда
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # SPA роутинг
    }

    # REVERSE PROXY: Перенаправление запросов к API на бэкенд-контейнер
    location /api/v1/ {
        proxy_pass http://too-link-app:3000/api/v1/;
        proxy_http_version 1.1;
        
        # Передача сетевых заголовков
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
