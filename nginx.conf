# Блок 1: Обработка HTTP (80) и выпуск SSL-сертификатов
server {
    listen 80;
    server_name localhost; # Замените на ваш домен, например billing.too-link.kg

    # Путь для валидации Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # Редирект с HTTP на HTTPS (раскомментировать ПОСЛЕ получения сертификатов)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # Временный роутинг для первого запуска фронтенда (удалить ПОСЛЕ включения HTTPS)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}

