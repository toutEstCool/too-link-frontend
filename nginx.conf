server {
    listen 80;
    server_name localhost;

    # Логи доступа и ошибок
    access_log /var/log/nginx/billing_access.log;
    error_log /var/log/nginx/billing_error.log;

    # Раздача статических файлов фронтенда
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # SPA роутинг
    }

    # REVERSE PROXY: Перенаправление запросов к API на бэкенд-контейнер
    location /api/v1/ {
        # Использование резолвера Docker для предотвращения падения Nginx при запуске,
        # если контейнер бэкенда временно недоступен или не разрешается.
        resolver 127.0.0.11 valid=30s;
        
        # Имя контейнера бэкенда в Dokploy (соответствует ID приложения)
        set $upstream_backend toolink-backend-q1e00s;
        
        proxy_pass http://$upstream_backend:3000;
        proxy_http_version 1.1;
        
        # Передача сетевых заголовков
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
